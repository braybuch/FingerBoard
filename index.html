<!DOCTYPE html>
<html lang="en">
<link rel="icon" type="image/png" href="favicon.png">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FingerBoard Beta</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #f6f7fb;
  --card: #ffffff;
  --card-soft: #fafafe;
  --line: #e7e8f2;
  --line-strong: #dcdff0;
  --text: #1a1a1a;
  --muted: #6f7282;
  --soft-muted: #a0a4b8;
  --accent: #534ab7;
  --accent-soft: #f0edff;
  --success: #2e7d32;
  --danger: #c62828;
  --shadow: 0 8px 30px rgba(0,0,0,0.05);
  --radius: 18px;
  --radius-sm: 12px;
}

body {
  background: var(--bg);
  font-family: system-ui, sans-serif;
  color: var(--text);
  min-height: 100vh;
  line-height: 1.35;
  padding: 0.75rem;
}

/* App shell */
.app-shell {
  width: 100%;
  max-width: 820px;
  margin: 0 auto;
  background: var(--card);
  border-radius: 24px;
  box-shadow: var(--shadow);
  padding: 1rem;
}

/* Header */
.app-header {
  text-align: center;
  margin-bottom: 1rem;
}

.app-title {
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 700;
}

.app-subtitle {
  margin-top: 0.25rem;
  font-size: 0.9rem;
  color: var(--muted);
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
  margin-bottom: 0.9rem;
}

.stat {
  background: var(--card-soft);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 0.55rem 0.35rem;
  text-align: center;
}

.stat-value {
  font-size: 0.95rem;
  font-weight: 700;
}

.stat-label {
  margin-top: 0.15rem;
  font-size: 0.68rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* Labels */
.mode-label {
  text-align: center;
  font-size: 0.68rem;
  color: var(--soft-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.6rem;
}

/* Progress */
.progress-wrap {
  max-width: 680px;
  margin: 0 auto 0.8rem auto;
}

.progress-track {
  width: 100%;
  height: 5px;
  background: #ececf4;
  border-radius: 999px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  border-radius: 999px;
  transition: width 0.3s ease;
}

.progress-label {
  text-align: right;
  margin-top: 0.3rem;
  font-size: 0.68rem;
  color: var(--soft-muted);
}

/* Feedback */
.feedback {
  min-height: 1.2em;
  text-align: center;
  font-size: 0.85rem;
  margin-bottom: 0.8rem;
  color: var(--muted);
}

.feedback.good { color: var(--success); }
.feedback.bad { color: var(--danger); }

/* Prompt box */
.prompt-box {
  width: 100%;
  max-width: 680px;
  margin: 0 auto 1rem auto;
  background: #fcfcff;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 1rem;
  font-size: clamp(1rem, 2.6vw, 1.15rem);
  line-height: 1.45;
  min-height: 64px;
}

.word-pending { color: #a6a9b8; }
.word-correct { color: var(--success); }
.word-wrong {
  color: var(--danger);
  text-decoration: underline wavy var(--danger);
}
.word-current {
  color: var(--text);
  background: var(--accent-soft);
  border-radius: 6px;
  padding: 0 4px;
}

/* Input row */
.input-row {
  display: flex;
  width: 100%;
  max-width: 680px;
  margin: 0 auto 1rem auto;
}

#typed-input {
  width: 100%;
  border: 1px solid var(--line-strong);
  border-radius: 14px;
  padding: 0.9rem 1rem;
  font-size: 1rem;
  outline: none;
  background: white;
}

#typed-input:focus {
  border-color: var(--accent);
}

/* Buttons */
button {
  border: none;
  border-radius: 16px;
  padding: 0.95rem 1rem;
  font-size: 1rem;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.08s ease, opacity 0.15s ease;
}

button:hover {
  opacity: 0.96;
}

button:active {
  transform: translateY(1px);
}

/* Keyboard panel */
.kb-panel {
  display: none;
  width: 100%;
  max-width: 680px;
  margin: 0 auto;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 1rem;
}

.kb-panel.open {
  display: block;
}

.kb-layout {
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}

/* Ghost */
.kb-ghost {
  width: 100%;
  min-height: 56px;
  background: #f7f7fc;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 0.9rem 1rem;
  font-size: 1.15rem;
  font-family: monospace;
  display: flex;
  align-items: center;
  position: relative;
}

.kb-ghost-placeholder {
  color: #b8bccb;
  font-size: 0.85rem;
  position: absolute;
}

.ghost-typed { color: var(--text); }
.ghost-pipe {
  color: var(--accent);
  font-weight: 700;
}
.ghost-pending { color: #b0b4c3; }

/* Finger buttons */
.kb-fingers {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.6rem;
}

.kb-finger-btn {
  min-height: 78px;
  background: white;
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 0.7rem 0.4rem;
  box-shadow: 0 3px 10px rgba(0,0,0,0.04);
}

.kb-finger-btn.active {
  transform: translateY(1px);
}

.finger-row {
  display: flex;
  justify-content: center;
  gap: 0.22rem;
}

.fl {
  font-family: monospace;
  font-size: clamp(1rem, 2.5vw, 1.15rem);
  line-height: 1.15;
  font-weight: 600;
}

/* Thumb row */
.kb-thumbs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}

.kb-lock-btn {
  background: var(--accent);
  color: white;
  font-weight: 700;
  font-size: 1.05rem;
}

.kb-page-btn {
  background: #f3f3f8;
  color: var(--text);
  font-weight: 600;
  font-size: 1.05rem;
}

/* Bottom actions */
.input-actions {
  width: 100%;
  max-width: 680px;
  margin: 1rem auto 0 auto;
  display: flex;
  gap: 0.75rem;
}

.input-actions button {
  flex: 1;
}

/* Footer */
.site-footer {
  margin-top: 2rem;
  border-top: 1px solid var(--line);
  background: #f8f8fc;
  padding: 2rem 0;
}

.footer-inner {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 1rem;
}

.footer-section h3 {
  margin-bottom: 0.5rem;
}

.footer-note {
  font-size: 0.9rem;
  color: var(--muted);
  margin-bottom: 0.75rem;
}

.feedback-box {
  width: 100%;
  min-height: 100px;
  resize: vertical;
  border: 1px solid var(--line-strong);
  border-radius: 14px;
  padding: 0.9rem;
  font-size: 1rem;
  font-family: inherit;
  background: white;
  margin-bottom: 0.75rem;
}

.footer-button {
  width: 100%;
}

.footer-meta {
  margin-top: 1rem;
  text-align: center;
  font-size: 0.85rem;
  color: var(--soft-muted);
}

/* Focus mode */
.focus-hidden {
  display: none !important;
}

body.focus-mode .prompt-box {
  margin-top: 1rem;
}

body.focus-mode .kb-panel {
  margin-top: 1rem;
}

/* Success animation */
.prompt-success {
  animation: promptSuccessFlash 500ms ease;
}

@keyframes promptSuccessFlash {
  0% { transform: scale(1); }
  30% { transform: scale(1.015); }
  100% { transform: scale(1); }
}

.prompt-success-glow {
  box-shadow:
    0 0 0 2px rgba(46,125,50,0.14),
    0 0 18px rgba(46,125,50,0.16);
  border-color: var(--success) !important;
}

/* Responsive */
@media (max-width: 700px) {
  body {
    padding: 0.4rem;
  }

  .app-shell {
    padding: 0.8rem;
    border-radius: 18px;
  }

  .stats {
    gap: 0.4rem;
  }

  .stat {
    padding: 0.45rem 0.2rem;
  }

  .stat-value {
    font-size: 0.85rem;
  }

  .stat-label {
    font-size: 0.62rem;
  }

  .kb-fingers {
    grid-template-columns: repeat(4, 1fr);
    gap: 0.45rem;
  }

  .kb-finger-btn {
    min-height: 72px;
    padding: 0.6rem 0.2rem;
  }

  .fl {
    font-size: 0.95rem;
  }

  .kb-thumbs button {
    min-height: 56px;
  }

  .input-actions {
    flex-direction: column;
  }
}

/* First-word guided highlight */
.kb-finger-btn.tutorial-glow,
.kb-lock-btn.tutorial-glow,
.kb-page-btn.tutorial-glow {
  border: 2px solid #2e7d32;
  box-shadow:
    0 0 0 3px rgba(46,125,50,0.12),
    0 0 18px rgba(46,125,50,0.18);
  animation: tutorialPulse 1s ease-in-out infinite;
}

@keyframes tutorialPulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.025); }
  100% { transform: scale(1); }
}

button,
input,
.kb-finger-btn,
.kb-lock-btn,
.kb-page-btn {
  touch-action: manipulation;
}

</style>
</head>

    <div class="kb-thumbs">

<script>
/* =========================================================
   TRAINER LOGIC
   ========================================================= */
const TUTORIAL = [
  "hi",
  "welcome to fingerboard",
  "press enter when the word on screen is correct",
  "press next if the word on screen is not correct",
  "fingerboard makes typing more efficient",
  "you do not need to type every letter", 
  "the system will predict for you",
  "after a few presses the most likely word will usually appear",
  "common words become familiar very quickly with practice",
  "soon you will enter longer words without looking at the keyboard",
  "fingerboard is designed for comfortable and quick typing",
  "now begin practicing and let your fingers learn the patterns"
];

const PRACTICE = [
  "the quick brown fox jumps over the lazy dog near the river bank",
  "typing every day helps improve both speed and accuracy over time",
  "a calm morning breeze carried leaves across the empty parking lot",
  "she packed her notebook, headphones, and charger before leaving home",
  "bright stars filled the sky as the city lights faded in the distance",
  "learning to type without looking at the keyboard takes steady practice",
  "the small coffee shop on the corner serves fresh bread every morning",
  "they finished reading the article just before the meeting began online",
  "rain tapped softly against the window during the quiet afternoon class",
  "simple habits repeated daily often lead to remarkable long term progress",
  "the bicycle leaned against the fence beside a row of blooming flowers",
  "several students stayed late to complete their science project together",
  "clear instructions make complex tasks easier to understand and complete",
  "the train arrived exactly on time despite the heavy snow last night",
  "fresh oranges and apples were arranged neatly in wooden market baskets",
  "a well designed typing test should balance challenge with readability",
  "the old library clock chimed twice as visitors entered through the hall",
  "music played softly in the background while the programmer wrote code",
  "each practice round should encourage focus rather than rushed mistakes",
  "winter sunlight reflected brightly off the frozen lake behind the school"
];

let mode            = "tutorial";  // "tutorial" | "practice"
let tutorialIndex   = 0;
let practicesDone   = 0;

let currentWords    = [];
let wordIndex       = 0;
let startTime       = null;
let totalAttempts   = 0;
let correctAttempts = 0;
let streak          = 0;

let totalKeystrokes = 0;
let totalCharacters = 0;

function updateProgress() {
  const fill  = document.getElementById("progress-fill");
  const label = document.getElementById("progress-label");
  const modeEl = document.getElementById("mode-label");

  if (mode === "tutorial") {
    const pct = Math.round((tutorialIndex / TUTORIAL.length) * 100);
    fill.style.width = pct + "%";
    label.textContent = tutorialIndex + " / " + TUTORIAL.length;
    modeEl.textContent = "tutorial";
  } else {
    const pct = Math.min(100, Math.round((practicesDone / 20) * 100));
    fill.style.width = pct + "%";
    label.textContent = practicesDone + " completed";
    modeEl.textContent = "free practice";
  }
}

function newRound() {
  let sentence;
  if (mode === "tutorial") {
    if (tutorialIndex >= TUTORIAL.length) {
      mode = "practice";
      setFeedback("tutorial complete keep going!", "good");
    }
  }

  if (mode === "tutorial") {
    sentence = TUTORIAL[tutorialIndex];
  } else {
    sentence = PRACTICE[Math.floor(Math.random() * PRACTICE.length)];
  }

  currentWords = sentence.split(" ");
  wordIndex    = 0;
  startTime    = null;
  renderPrompt();
  updateProgress();
  document.getElementById("typed-input").value = "";
  document.getElementById("typed-input").focus();
  if (mode === "practice") {
    document.getElementById("feedback").textContent = "";
    document.getElementById("feedback").className = "feedback";
  }

  updateTutorialHint();
}

function renderPrompt() {
  const box = document.getElementById("prompt-box");
  box.innerHTML = currentWords.map((w, i) => {
    let cls = "word-pending";
    if (i < wordIndex)   cls = "word-correct";
    if (i === wordIndex) cls = "word-current";
    return `<span class="word ${cls}">${w}</span>`;
  }).join(" ");
}

function submitAttempt() {
  const input = document.getElementById("typed-input");
  const typed = input.value.trim();
  if (!typed) return;

  if (startTime === null) startTime = Date.now();

  const expected = currentWords[wordIndex];
  totalAttempts++;

  if (typed === expected) {
    if (!tutorialHintShown && mode === "tutorial" && tutorialIndex === 0 && wordIndex === 0) {
      tutorialHintShown = true;
      clearTutorialGlow();
    }
    totalCharacters += typed.length;
    correctAttempts++;
    streak++;
    wordIndex++;

    kbReset();
    renderPrompt();
    updateTutorialHint();

    if (wordIndex >= currentWords.length) {
      flashPromptSuccess();
      const elapsed = (Date.now() - startTime) / 1000 / 60;
      const wpm = Math.round(currentWords.length / elapsed);
      const acc = Math.round((correctAttempts / totalAttempts) * 100);
      const kpc = totalCharacters > 0 ? (totalKeystrokes / totalCharacters).toFixed(2) : " ";
      document.getElementById("wpm-display").textContent = wpm;
      document.getElementById("acc-display").textContent = acc + "%";
      document.getElementById("kpc-display").textContent = kpc;
      document.getElementById("streak-display").textContent = streak;

      if (mode === "tutorial") {
        tutorialIndex++;
        setFeedback(tutorialIndex < TUTORIAL.length ? "nice!" : "tutorial complete!", "good");
      } else {
        practicesDone++;
        setFeedback("nice work!", "good");
      }
      setTimeout(newRound, 700);
    } else {
      setFeedback("", "");
      renderPrompt();
    }
  } else {
    streak = 0;
    document.getElementById("streak-display").textContent = streak;
    const box   = document.getElementById("prompt-box");
    const spans = box.querySelectorAll(".word");
    spans[wordIndex].className = "word word-wrong";
    setFeedback(`expected: "${expected}"`, "bad");
    setTimeout(() => {
      spans[wordIndex].className = "word word-current";
      setFeedback("", "");
    }, 1000);
  }

  input.value = "";
}

function setFeedback(msg, type) {
  const el = document.getElementById("feedback");
  el.textContent = msg;
  el.className = "feedback" + (type ? " " + type : "");
}

document.getElementById("typed-input").addEventListener("keydown", e => {
  if (e.key === "Enter") submitAttempt();
  if (e.key === " ") { e.preventDefault(); submitAttempt(); }
});

/* =========================================================
   FINGERBOARD ENGINE
   ========================================================= */
const CHAR_TO_KEY = {
  // Group 3
  q:3, w:3, e:3, r:3, t:3, y:3, u:3,

  // Group 2
  a:2, s:2, d:2, f:2, g:2, h:2, j:2,

  // Group 1
  z:1, x:1, c:1, v:1, b:1, n:1, m:1,

  // Group 0
  i:0, o:0, p:0, k:0, l:0
};

function getSignature(word) {
  let sig = "";
  for (const c of word) {
    const k = CHAR_TO_KEY[c];
    if (k !== undefined) sig += k;
  }
  return sig;
}

let prefixMap    = {};
let signatureMap = {};

const BUILTIN_WORDS = [
  // tutorial sentence words first — guaranteed first predictions
  "hi",
  "welcome","to","fingerboard",
  "press","enter","when","the","word","on","screen","is","correct",
  "next","choose","a","different","matching","full","words","lets","you","type","more","efficiently",
  "do","not","need","every","letter",
  "system","will","predict","for",
  "after","few","presses","most","likely","usually","appear",

  "soon","longer","without","looking","at","keyboard",

  "now","begin","practicing","let","your","fingers","learn","patterns",

  // practice sentence words
  "brown","fox","jumps","over","lazy","dog","near","river","bank",
  "day","helps","improve","both","speed","accuracy","time",
  "calm","morning","breeze","carried","leaves","across","empty","parking","lot",
  "she","packed","her","notebook","headphones","charger","before","leaving","home",
  "bright","stars","filled","sky","as","city","lights","faded","in","distance",
  "learning","steady","takes",
  "small","coffee","shop","corner","serves","fresh","bread",
  "they","finished","reading","article","just","meeting","began","online",
  "rain","tapped","softly","against","window","during","quiet","afternoon","class",
  "simple","habits","repeated","daily","often","lead","remarkable","long","term","progress",
  "bicycle","leaned","fence","beside","row","blooming","flowers",
  "several","students","stayed","late","complete","their","science","project","together",
  "clear","instructions","make","complex","tasks","easier","understand",
  "train","arrived","exactly","despite","heavy","snow","last","night",
  "oranges","apples","were","arranged","neatly","wooden","market","baskets",
  "well","test","should","balance","challenge","readability",
  "old","library","clock","chimed","twice","visitors","entered","through","hall",
  "music","played","background","while","programmer","wrote","code",
  "each","round","encourage","focus","rather","than","rushed","mistakes",
  "winter","sunlight","reflected","brightly","off","frozen","lake","behind","school",

  // general high-frequency fill
  "be","that","have","he","but","his","by","we","say","or","an","my",
  "all","would","there","what","so","up","out","if","about","who",
  "go","me","like","no","him","know","take",
  "people","into","year","good","some","could","them","see","other",
  "then","look","come","its","think","also",
  "back","use","two","how","our","work","way","even","want",
  "because","any","these","give","us","great",
  "hand","high","place","hold","turn","here","why","help",
  "put","same","tell","follow","came","show","form","set",
  "never","open","seem","got","walk"
];

function buildMaps(words) {
  prefixMap    = {};
  signatureMap = {};
  for (const word of words) {
    const sig = getSignature(word);
    if (!sig) continue;
    if (!signatureMap[sig]) signatureMap[sig] = [];
    signatureMap[sig].push(word);
    for (let i = 0; i <= sig.length; i++) {
      const pre = sig.slice(0, i);
      if (!prefixMap[pre]) prefixMap[pre] = [];
      prefixMap[pre].push(word);
    }
  }
}

function vocabPeek(prefix, n) {
  return (prefixMap[prefix] || []).slice(0, n);
}

function vocabRead(sig) {
  return signatureMap[sig] || [];
}

buildMaps(BUILTIN_WORDS);

/* Try to load dictionary.txt from same directory (GitHub Pages) */
fetch("dictionary.txt")
  .then(r => r.ok ? r.text() : Promise.reject())
  .then(text => {
    const words = text.split("\n").map(l => l.trim().toLowerCase()).filter(Boolean);
    buildMaps(words);
  })
  .catch(err => {
  console.error("Dictionary load failed:", err);
});

/* =========================================================
   ENGINE STATE  (ported from FingerboardModel.java)
   ---------------------------------------------------------
   browseIndex semantics (mirrors Java int browseIndex):
     -1  → Predicting  (prefix-peek mode, no exact-match list yet)
     ≥0  → Browsing    (exact-match list captured, index tracks Slot 2)
   ========================================================= */
let kbSig           = "";          // finger-press sequence so far
let kbBrowseIndex   = -1;          // -1 = Predicting, ≥0 = Browsing
let kbSuggestions   = ["", ""];    // [Slot1, Slot2]  shown to user
let kbExactMatches  = [];          // captured once on Handoff, reused while Browsing

/* Called whenever a finger button is pressed.
   Mirrors Java: addInput() — snaps back to Predicting and calls updatePredicting(). */
function kbFinger(index) {
  totalKeystrokes++;
  kbSig += index;

  // Snap back to Predicting (discard any in-progress browse)
  kbBrowseIndex  = -1;
  kbExactMatches = [];

  kbUpdatePredicting();
  kbRenderGhost();
  flashFinger(index);
}

/* Mirrors Java: updatePredicting() — prefix-peek, fills both slots. */
function kbUpdatePredicting() {
  const picks = vocabPeek(kbSig, 2);
  kbSuggestions[0] = picks[0] || "";
  kbSuggestions[1] = picks[1] || "";
}

/* kbNext() — two-state machine mirroring FingerboardModel.nextPage().
   HANDOFF  (kbBrowseIndex === -1): first Next press after finger input.
   BROWSING (kbBrowseIndex  >=  0): subsequent Next presses. */
function kbNext() {
  totalKeystrokes++;
  if (!kbSig) return;

  if (kbBrowseIndex === -1) {
    /* ── HANDOFF: Predicting → Browsing ── */

    // Capture exact-match list once; reused for the whole browse session.
    kbExactMatches = vocabRead(kbSig);

    // Remember what the user already saw so we don't show it again.
    const alreadySeen = new Set(
      [kbSuggestions[0], kbSuggestions[1]].filter(Boolean)
    );

    // Promote old Slot 2 to Slot 1 (what the user was peeking at).
    kbSuggestions[0] = kbSuggestions[1];

    // Find the first exact match the user hasn't seen yet for Slot 2.
    let matchIdx = 0;
    while (
      matchIdx < kbExactMatches.length &&
      alreadySeen.has(kbExactMatches[matchIdx])
    ) {
      matchIdx++;
    }

    kbSuggestions[1] = (matchIdx < kbExactMatches.length)
      ? kbExactMatches[matchIdx]
      : "";
    kbBrowseIndex = matchIdx;

  } else {
    /* ── BROWSING: advance one step ── */

    // Promote Slot 2 → Slot 1.
    kbSuggestions[0] = kbSuggestions[1];

    // Advance and skip any entry that duplicates the new Slot 1.
    kbBrowseIndex++;
    if (
      kbBrowseIndex < kbExactMatches.length &&
      kbExactMatches[kbBrowseIndex] === kbSuggestions[0]
    ) {
      kbBrowseIndex++;
    }

    kbSuggestions[1] = (kbBrowseIndex < kbExactMatches.length)
      ? kbExactMatches[kbBrowseIndex]
      : "";
  }

  kbRenderGhost();
  updateTutorialHint();
}

/* Confirm (Lock) — commit Slot 1 to the text input and submit. */
function kbConfrim() {
  totalKeystrokes++;
  const word = kbSuggestions[0];
  if (!word) return;
  document.getElementById("typed-input").value = word;
  submitAttempt();
}

/* Reset all engine state — called after a word is committed or on kbFinger. */
function kbReset() {
  clearTutorialGlow();
  kbSig          = "";
  kbBrowseIndex  = -1;
  kbSuggestions  = ["", ""];
  kbExactMatches = [];
  kbRenderGhost();
}

/* Render the ghost word display from current Slot 1 suggestion. */
function kbRenderGhost() {
  const word   = kbSuggestions[0];
  const sigLen = kbSig.length;
  const ph     = document.getElementById("ghost-placeholder");

  if (!word && sigLen === 0) {
    ph.style.display = "";
    document.getElementById("ghost-typed").textContent   = "";
    document.getElementById("ghost-pipe").textContent    = "";
    document.getElementById("ghost-pending").textContent = "";
    return;
  }

  ph.style.display = "none";

  if (!word) {
    document.getElementById("ghost-typed").textContent   = "";
    document.getElementById("ghost-pipe").textContent    = "";
    document.getElementById("ghost-pending").textContent = "[no match]";

    // Auto-reset after brief pause so user isn't stuck
    setTimeout(() => { kbReset(); }, 700);
    return;
  }

  const typedPart   = word.slice(0, Math.min(sigLen, word.length));
  const pendingPart = sigLen < word.length ? word.slice(sigLen) : "";

  document.getElementById("ghost-typed").textContent   = typedPart;
  document.getElementById("ghost-pipe").textContent    = "|";
  document.getElementById("ghost-pending").textContent = pendingPart;

  updateTutorialHint();
}

function flashFinger(index) {
  const btn = document.getElementById("fb-" + index);
  if (!btn) return;
  btn.classList.add("active");
  setTimeout(() => btn.classList.remove("active"), 150);
}

function toggleKb() {
  document.getElementById("kb-panel").classList.toggle("open");
}

function skipTutorial() {
  mode = "practice";
  tutorialIndex = TUTORIAL.length;
  practicesDone = 0;
  setFeedback("tutorial skipped", "good");
  newRound();
}

let keyboardVisible = true;

function toggleInputMode() {
  const kbPanel = document.getElementById("kb-panel");
  const inputRow = document.querySelector(".input-row");
  const btn = event.target;

  keyboardVisible = !keyboardVisible;

  if (keyboardVisible) {
    toggleKb();
    inputRow.style.display = "none";
    btn.textContent = "Show input row";
  } else {
    toggleKb();
    inputRow.style.display = "flex";
    btn.textContent = "Hide input row";
    document.getElementById("typed-input").focus();
  }
}

window.addEventListener("DOMContentLoaded", () => {
  const isGitHubPages =
    location.hostname.includes("github.io");

  if (isGitHubPages) {
    document.getElementById("dev-buttons").style.display = "none";
    document.querySelector(".input-row").style.display = "none";
  }
});

function openFeedbackIssue() {
  const msg = document.getElementById("feedbackBox").value.trim();

  if (!msg) {
    alert("Please enter feedback first.");
    return;
  }

  const url =
    "https://github.com/BrayBuch/FingerBoard/issues/new?title=Beta Feedback&body=" +
    encodeURIComponent(msg);

  window.open(url, "_blank");
}

let focusMode = false;

function toggleFocusMode() {
  focusMode = !focusMode;

  const body = document.body;
  const btn = document.getElementById("focus-btn");
  const feedback = document.getElementById("feedback");

  body.classList.toggle("focus-mode", focusMode);

  const hideSelectors = [
    ".app-header",
    ".stats",
    ".mode-label",
    ".progress-wrap",
    ".feedback",
    "#dev-buttons",
    ".site-footer"
  ];

  hideSelectors.forEach(selector => {
    document.querySelectorAll(selector).forEach(el => {
      if (el !== btn.parentElement) {
        el.classList.toggle("focus-hidden", focusMode);
      }
    });
  });

  // Explicitly suppress feedback in focus mode
  if (focusMode) {
    feedback.style.display = "none";
    feedback.textContent = "";
  } else {
    feedback.style.display = "";
  }

  btn.textContent = focusMode ? "See more" : "See less";
}

function flashPromptSuccess() {
  const box = document.getElementById("prompt-box");

  box.classList.remove("prompt-success", "prompt-success-glow");

  void box.offsetWidth; // restart animation

  box.classList.add("prompt-success", "prompt-success-glow");

  setTimeout(() => {
    box.classList.remove("prompt-success", "prompt-success-glow");
  }, 500);
}

let tutorialHintShown = true;

function clearTutorialGlow() {
  document.querySelectorAll(".tutorial-glow").forEach(el => {
    el.classList.remove("tutorial-glow");
  });
}

function updateTutorialHint() {
  clearTutorialGlow();

  if (mode !== "tutorial") return;
  if (wordIndex >= currentWords.length) return;

  const expected = currentWords[wordIndex];
  if (!expected) return;

  const expectedSig = getSignature(expected);

  if (kbSuggestions[0] === expected) {
    const enterBtn = document.querySelector(".kb-lock-btn");
    if (enterBtn) enterBtn.classList.add("tutorial-glow");
    return;
  }

  if (kbSig.length < expectedSig.length) {
    const nextChar = expected[kbSig.length]?.toLowerCase();
    const finger = CHAR_TO_KEY[nextChar];
    if (finger !== undefined) {
      const btn = document.getElementById("fb-" + finger);
      if (btn) btn.classList.add("tutorial-glow");
    }
    return;
  }

  const nextBtn = document.querySelector(".kb-page-btn");
  if (nextBtn) nextBtn.classList.add("tutorial-glow");
}
updateProgress();
newRound();
