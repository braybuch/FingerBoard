<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FingerBoard Teaches Typing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: #555;
    margin-bottom: 2rem;
  }

  .stats {
    display: flex;
    gap: 2rem;
    margin-bottom: 2rem;
  }

  .stat { text-align: center; }

  .stat-value {
    font-size: 1.8rem;
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1;
  }

  .stat-label {
    font-size: 0.75rem;
    color: #888;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .prompt-box {
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 10px;
    padding: 1.25rem 1.25rem;
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.25rem;
    min-height: 72px;
    line-height: 1.9;
    font-size: clamp(1rem, 3.5vw, 1.25rem);
    letter-spacing: 0.01em;
  }

  .word { display: inline; }
  .word-pending  { color: #aaa; }
  .word-correct  { color: #2e7d32; }
  .word-wrong    { color: #c62828; text-decoration: underline wavy #c62828; }
  .word-current  { color: #1a1a1a; background: #f0edff; border-radius: 4px; padding: 0 3px; }

  .input-row {
    display: flex;
    gap: 0.75rem;
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.25rem;
  }

  #typed-input {
    flex: 1;
    padding: 0.65rem 1rem;
    font-size: 1.1rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
  }

  #typed-input:focus { border-color: #7f77dd; }

  button {
    padding: 0.65rem 1.25rem;
    font-size: 0.95rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    color: #1a1a1a;
  }

  button:hover { background: #f0edff; border-color: #7f77dd; }

  .feedback {
    font-size: 0.9rem;
    color: #555;
    min-height: 1.4em;
    margin-bottom: 1rem;
    text-align: center;
  }

  .feedback.good { color: #2e7d32; }
  .feedback.bad  { color: #c62828; }

  .panel-toggle {
    font-size: 0.8rem;
    color: #888;
    cursor: pointer;
    text-decoration: underline dotted;
    margin-bottom: 0.5rem;
    background: none;
    border: none;
    padding: 0;
  }

  .panel-toggle:hover { color: #534ab7; background: none; border: none; }

  /* ---- On-screen keyboard panel ---- */
  .kb-panel {
    display: none;
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 10px;
    padding: 1rem;
    width: 100%;
    max-width: 680px;
    margin-top: 0.5rem;
  }

  .kb-panel.open { display: block; }

  .kb-layout {
    display: flex;
    gap: 0.6rem;
    align-items: stretch;
  }

  .kb-ghost {
    flex: 1;
    min-width: 0;
    background: #f9f8f5;
    border: 1px solid #e0ddd6;
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    font-size: clamp(1rem, 4vw, 1.4rem);
    font-family: monospace;
    min-height: 52px;
    display: flex;
    align-items: center;
    letter-spacing: 0.04em;
    position: relative;
    overflow: hidden;
  }

  .kb-ghost-placeholder {
    color: #ccc;
    font-size: 0.85rem;
    font-family: system-ui, sans-serif;
    letter-spacing: 0;
    position: absolute;
    pointer-events: none;
  }

  .ghost-typed   { color: #1a1a1a; }
  .ghost-pipe    { color: #534ab7; font-weight: 500; }
  .ghost-pending { color: #bbb; }

  .kb-fingers {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-shrink: 0;
  }

  .kb-finger-btn {
    width: clamp(80px, 22vw, 120px);
    padding: 0.45rem 0.4rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, transform 0.07s;
    text-align: center;
    color: #1a1a1a;
    -webkit-tap-highlight-color: transparent;
  }

  .kb-finger-btn:hover  { background: #f0edff; border-color: #7f77dd; }
  .kb-finger-btn:active,
  .kb-finger-btn.active { background: #534ab7; color: #fff; border-color: #3c3489; transform: scale(0.96); }

  .finger-name {
    font-weight: 500;
    font-size: clamp(0.55rem, 1.8vw, 0.68rem);
    color: inherit;
    opacity: 0.6;
    display: block;
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .finger-row {
    display: flex;
    justify-content: center;
    gap: 3px;
    line-height: 1;
  }

  .finger-row + .finger-row {
    margin-top: 2px;
  }

  .fl {
    font-family: monospace;
    font-size: clamp(0.65rem, 2vw, 0.8rem);
    color: inherit;
    opacity: 0.8;
  }

  .kb-thumbs {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-shrink: 0;
  }

  .kb-lock-btn {
    padding: 0.45rem 0.7rem;
    font-size: clamp(0.78rem, 2.5vw, 0.9rem);
    font-weight: 500;
    background: #534ab7;
    color: #fff;
    border: 1px solid #3c3489;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  .kb-lock-btn:hover  { background: #3c3489; border-color: #3c3489; }
  .kb-lock-btn:active { background: #3c3489; }

  .kb-page-btn {
    padding: 0.45rem 0.7rem;
    font-size: clamp(0.78rem, 2.5vw, 0.9rem);
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    transition: background 0.1s;
    color: #1a1a1a;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  .kb-page-btn:hover  { background: #f0edff; border-color: #7f77dd; }
  .kb-page-btn:active { background: #f0edff; }

  .mode-label {
    font-size: 0.72rem;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    margin-bottom: 0.6rem;
    text-align: center;
  }

  .progress-wrap {
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.5rem;
  }

  .progress-track {
    width: 100%;
    height: 5px;
    background: #e8e6e0;
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #534ab7;
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 0.72rem;
    color: #bbb;
    text-align: right;
    margin-top: 4px;
  }

  .input-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
    width: 100%;
    max-width: 680px;
  }

  .input-actions button {
    flex: 1;
  }

</style>
</head>
<body onload="toggleKb()">

<h1>fingerboard teaches typing</h1>

<div class="stats">
  <div class="stat">
    <div class="stat-value" id="wpm-display">—</div>
    <div class="stat-label">WPM</div>
  </div>
  <div class="stat">
  <div class="stat-value" id="kpc-display">—</div>
  <div class="stat-label">KPC</div>
</div>
  <div class="stat">
    <div class="stat-value" id="acc-display">—</div>
    <div class="stat-label">Accuracy</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="streak-display">0</div>
    <div class="stat-label">Streak</div>
  </div>
</div>

<div class="mode-label" id="mode-label">tutorial</div>

<div class="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="progress-label" id="progress-label">0 / 12</div>
</div>

<div class="feedback" id="feedback"></div>

<div class="prompt-box" id="prompt-box"></div>

<div class="input-row">
  <input type="text" id="typed-input" placeholder="start typing..." autocomplete="off" autocorrect="off" spellcheck="false" />
</div>

<div class="kb-panel" id="kb-panel">
  <div class="kb-layout">

    <div class="kb-ghost" id="kb-ghost">
      <span class="kb-ghost-placeholder" id="ghost-placeholder">press a finger key...</span>
      <span class="ghost-typed"   id="ghost-typed"></span><span class="ghost-pipe" id="ghost-pipe"></span><span class="ghost-pending" id="ghost-pending"></span>
    </div>

    <div class="kb-fingers">
      <button class="kb-finger-btn" id="fb-3" onclick="kbFinger(3)">
        <div class="finger-row"><span class="fl">q</span><span class="fl">w</span><span class="fl">e</span><span class="fl">r</span></div>
        <div class="finger-row"><span class="fl">t</span><span class="fl">y</span><span class="fl">u</span></div>
      </button>
      <button class="kb-finger-btn" id="fb-2" onclick="kbFinger(2)">
        <div class="finger-row"><span class="fl">a</span><span class="fl">s</span><span class="fl">d</span><span class="fl">f</span></div>
        <div class="finger-row"><span class="fl">g</span><span class="fl">z</span><span class="fl">m</span></div>
      </button>
      <button class="kb-finger-btn" id="fb-1" onclick="kbFinger(1)">
        <div class="finger-row"><span class="fl">c</span><span class="fl">v</span><span class="fl">b</span></div>
        <div class="finger-row"><span class="fl">h</span><span class="fl">i</span><span class="fl">n</span></div>
      </button>
      <button class="kb-finger-btn" id="fb-0" onclick="kbFinger(0)">
        <div class="finger-row"><span class="fl">o</span><span class="fl">p</span><span class="fl">j</span></div>
        <div class="finger-row"><span class="fl">k</span><span class="fl">l</span><span class="fl">x</span></div>
      </button>
    </div>

    <div class="kb-thumbs">
      <button class="kb-lock-btn" onclick="kbConfrim()">Enter</button>
      <button class="kb-page-btn" onclick="kbNext()">Next</button>
    </div>

  </div>

</div>

<div class="input-actions" id="dev-buttons">
  <button onclick="skipTutorial()">Skip</button>
  <button onclick="toggleInputMode()">Hide Keyboard</button>
</div>

<script>
/* =========================================================
   TRAINER LOGIC
   ========================================================= */
const TUTORIAL = [
  "hi",
  "welcome to fingerboard",
  "press enter when the word on screen is correct",
  "press next to choose a different matching word",
  "fingerboard lets you type full words more efficiently",
  "you do not need to type every letter", 
  "the system will predict for you",
  "after a few presses the most likely word will usually appear",
  "common words become familiar very quickly with practice",
  "soon you will enter longer words without looking at the keyboard",
  "fingerboard is designed for comfortable and quick typing",
  "now begin practicing and let your fingers learn the patterns"
];

const PRACTICE = [
  "the quick brown fox jumps over the lazy dog near the river bank",
  "typing every day helps improve both speed and accuracy over time",
  "a calm morning breeze carried leaves across the empty parking lot",
  "she packed her notebook, headphones, and charger before leaving home",
  "bright stars filled the sky as the city lights faded in the distance",
  "learning to type without looking at the keyboard takes steady practice",
  "the small coffee shop on the corner serves fresh bread every morning",
  "they finished reading the article just before the meeting began online",
  "rain tapped softly against the window during the quiet afternoon class",
  "simple habits repeated daily often lead to remarkable long term progress",
  "the bicycle leaned against the fence beside a row of blooming flowers",
  "several students stayed late to complete their science project together",
  "clear instructions make complex tasks easier to understand and complete",
  "the train arrived exactly on time despite the heavy snow last night",
  "fresh oranges and apples were arranged neatly in wooden market baskets",
  "a well designed typing test should balance challenge with readability",
  "the old library clock chimed twice as visitors entered through the hall",
  "music played softly in the background while the programmer wrote code",
  "each practice round should encourage focus rather than rushed mistakes",
  "winter sunlight reflected brightly off the frozen lake behind the school"
];

let mode            = "tutorial";  // "tutorial" | "practice"
let tutorialIndex   = 0;
let practicesDone   = 0;

let currentWords    = [];
let wordIndex       = 0;
let startTime       = null;
let totalAttempts   = 0;
let correctAttempts = 0;
let streak          = 0;

let totalKeystrokes = 0;
let totalCharacters = 0;

function updateProgress() {
  const fill  = document.getElementById("progress-fill");
  const label = document.getElementById("progress-label");
  const modeEl = document.getElementById("mode-label");

  if (mode === "tutorial") {
    const pct = Math.round((tutorialIndex / TUTORIAL.length) * 100);
    fill.style.width = pct + "%";
    label.textContent = tutorialIndex + " / " + TUTORIAL.length;
    modeEl.textContent = "tutorial";
  } else {
    const pct = Math.min(100, Math.round((practicesDone / 20) * 100));
    fill.style.width = pct + "%";
    label.textContent = practicesDone + " completed";
    modeEl.textContent = "free practice";
  }
}

function newRound() {
  let sentence;
  if (mode === "tutorial") {
    if (tutorialIndex >= TUTORIAL.length) {
      mode = "practice";
      setFeedback("tutorial complete keep going!", "good");
    }
  }

  if (mode === "tutorial") {
    sentence = TUTORIAL[tutorialIndex];
  } else {
    sentence = PRACTICE[Math.floor(Math.random() * PRACTICE.length)];
  }

  currentWords = sentence.split(" ");
  wordIndex    = 0;
  startTime    = null;
  renderPrompt();
  updateProgress();
  document.getElementById("typed-input").value = "";
  document.getElementById("typed-input").focus();
  if (mode === "practice") {
    document.getElementById("feedback").textContent = "";
    document.getElementById("feedback").className = "feedback";
  }
}

function renderPrompt() {
  const box = document.getElementById("prompt-box");
  box.innerHTML = currentWords.map((w, i) => {
    let cls = "word-pending";
    if (i < wordIndex)   cls = "word-correct";
    if (i === wordIndex) cls = "word-current";
    return `<span class="word ${cls}">${w}</span>`;
  }).join(" ");
}

function submitAttempt() {
  const input = document.getElementById("typed-input");
  const typed = input.value.trim();
  if (!typed) return;

  if (startTime === null) startTime = Date.now();

  const expected = currentWords[wordIndex];
  totalAttempts++;

  if (typed === expected) {
    totalCharacters += typed.length;
    correctAttempts++;
    streak++;
    wordIndex++;

    if (wordIndex >= currentWords.length) {
      const elapsed = (Date.now() - startTime) / 1000 / 60;
      const wpm = Math.round(currentWords.length / elapsed);
      const acc = Math.round((correctAttempts / totalAttempts) * 100);
      const kpc = totalCharacters > 0 ? (totalKeystrokes / totalCharacters).toFixed(2) : " ";
      document.getElementById("wpm-display").textContent = wpm;
      document.getElementById("acc-display").textContent = acc + "%";
      document.getElementById("kpc-display").textContent = kpc;
      document.getElementById("streak-display").textContent = streak;

      if (mode === "tutorial") {
        tutorialIndex++;
        setFeedback(tutorialIndex < TUTORIAL.length ? "nice!" : "tutorial complete!", "good");
      } else {
        practicesDone++;
        setFeedback("nice work!", "good");
      }
      setTimeout(newRound, 700);
    } else {
      setFeedback("", "");
      renderPrompt();
    }
  } else {
    streak = 0;
    document.getElementById("streak-display").textContent = streak;
    const box   = document.getElementById("prompt-box");
    const spans = box.querySelectorAll(".word");
    spans[wordIndex].className = "word word-wrong";
    setFeedback(`expected: "${expected}"`, "bad");
    setTimeout(() => {
      spans[wordIndex].className = "word word-current";
      setFeedback("", "");
    }, 1000);
  }

  input.value = "";
  kbReset();
}

function setFeedback(msg, type) {
  const el = document.getElementById("feedback");
  el.textContent = msg;
  el.className = "feedback" + (type ? " " + type : "");
}

document.getElementById("typed-input").addEventListener("keydown", e => {
  if (e.key === "Enter") submitAttempt();
  if (e.key === " ") { e.preventDefault(); submitAttempt(); }
});

/* =========================================================
   FINGERBOARD ENGINE
   ========================================================= */
const CHAR_TO_KEY = {
  q:3,w:3,e:3,r:3,t:3,y:3,u:3,
  a:2,s:2,d:2,f:2,g:2,z:2,m:2,
  h:1,i:1,b:1,n:1,c:1,v:1,
  o:0,p:0,j:0,k:0,l:0,x:0
};

function getSignature(word) {
  let sig = "";
  for (const c of word) {
    const k = CHAR_TO_KEY[c];
    if (k !== undefined) sig += k;
  }
  return sig;
}

let prefixMap    = {};
let signatureMap = {};

const BUILTIN_WORDS = [
  // tutorial sentence words first — guaranteed first predictions
  "hi",
  "welcome","to","fingerboard",
  "press","enter","when","the","word","on","screen","is","correct",
  "next","choose","a","different","matching","full","words","lets","you","type","more","efficiently",
  "do","not","need","every","letter",
  "system","will","predict","for",
  "after","few","presses","most","likely","usually","appear",
  "common","become","familiar","very","quickly","with","practice",
  "soon","longer","without","looking","at","keyboard",
  "designed","comfortable","and","quick","typing",
  "now","begin","practicing","let","your","fingers","learn","patterns",

  // practice sentence words
  "brown","fox","jumps","over","lazy","dog","near","river","bank",
  "day","helps","improve","both","speed","accuracy","time",
  "calm","morning","breeze","carried","leaves","across","empty","parking","lot",
  "she","packed","her","notebook","headphones","charger","before","leaving","home",
  "bright","stars","filled","sky","as","city","lights","faded","in","distance",
  "learning","steady","takes",
  "small","coffee","shop","corner","serves","fresh","bread",
  "they","finished","reading","article","just","meeting","began","online",
  "rain","tapped","softly","against","window","during","quiet","afternoon","class",
  "simple","habits","repeated","daily","often","lead","remarkable","long","term","progress",
  "bicycle","leaned","fence","beside","row","blooming","flowers",
  "several","students","stayed","late","complete","their","science","project","together",
  "clear","instructions","make","complex","tasks","easier","understand",
  "train","arrived","exactly","despite","heavy","snow","last","night",
  "oranges","apples","were","arranged","neatly","wooden","market","baskets",
  "well","test","should","balance","challenge","readability",
  "old","library","clock","chimed","twice","visitors","entered","through","hall",
  "music","played","background","while","programmer","wrote","code",
  "each","round","encourage","focus","rather","than","rushed","mistakes",
  "winter","sunlight","reflected","brightly","off","frozen","lake","behind","school",

  // general high-frequency fill
  "be","that","have","he","but","his","by","we","say","or","an","my",
  "all","would","there","what","so","up","out","if","about","who",
  "go","me","like","no","him","know","take",
  "people","into","year","good","some","could","them","see","other",
  "then","look","come","its","think","also",
  "back","use","two","how","our","work","way","even","want",
  "because","any","these","give","us","great",
  "hand","high","place","hold","turn","here","why","help",
  "put","same","tell","follow","came","show","form","set",
  "never","open","seem","got","walk"
];

function buildMaps(words) {
  prefixMap    = {};
  signatureMap = {};
  for (const word of words) {
    const sig = getSignature(word);
    if (!sig) continue;
    if (!signatureMap[sig]) signatureMap[sig] = [];
    signatureMap[sig].push(word);
    for (let i = 0; i <= sig.length; i++) {
      const pre = sig.slice(0, i);
      if (!prefixMap[pre]) prefixMap[pre] = [];
      prefixMap[pre].push(word);
    }
  }
}

function vocabPeek(prefix, n) {
  return (prefixMap[prefix] || []).slice(0, n);
}

function vocabRead(sig) {
  return signatureMap[sig] || [];
}

buildMaps(BUILTIN_WORDS);

/* Try to load dictionary.txt from same directory (GitHub Pages) */
fetch("dictionary.txt")
  .then(r => r.ok ? r.text() : Promise.reject())
  .then(text => {
    const words = text.split("\n").map(l => l.trim().toLowerCase()).filter(Boolean);
    buildMaps(words);
  })
  .catch(err => {
  console.error("Dictionary load failed:", err);
});

/* ---- Engine state ---- */
let kbSig         = "";
let kbBrowseIdx   = -1;
let kbSuggestions = ["", ""];
let kbPageMatches = [];

function kbUpdatePredicting() {
  const picks = vocabPeek(kbSig, 2);
  kbSuggestions[0] = picks[0] || "";
  kbSuggestions[1] = picks[1] || "";
  kbBrowseIdx   = -1;
  kbPageMatches = [];
}

function kbFinger(index) {
  totalKeystrokes++;
  kbSig += index;
  kbUpdatePredicting();
  kbRenderGhost();
  flashFinger(index);
}

function kbConfrim() {
  const word = kbSuggestions[0];
  if (!word) return;
  document.getElementById("typed-input").value = word;
  submitAttempt();
}

function kbNext() {
  if (!kbSig) return;

  if (kbBrowseIdx === -1) {
    /* Handoff: transition predicting -> browsing */
    kbPageMatches = vocabRead(kbSig);
    const slot1Was = kbSuggestions[1];
    kbSuggestions[0] = slot1Was;
    let startIdx = 0;
    if (kbPageMatches.length > 0 && kbPageMatches[0] === slot1Was) startIdx = 1;
    kbSuggestions[1] = kbPageMatches[startIdx] || "";
    kbBrowseIdx = startIdx;
  } else {
    /* Browsing: advance one step */
    kbSuggestions[0] = kbSuggestions[1];
    kbBrowseIdx++;
    if (kbBrowseIdx < kbPageMatches.length && kbPageMatches[kbBrowseIdx] === kbSuggestions[0]) {
      kbBrowseIdx++;
    }
    kbSuggestions[1] = kbPageMatches[kbBrowseIdx] || "";
  }

  kbRenderGhost();
}

function kbReset() {
  kbSig         = "";
  kbBrowseIdx   = -1;
  kbSuggestions = ["", ""];
  kbPageMatches = [];
  kbRenderGhost();
}

function kbRenderGhost() {
  const word   = kbSuggestions[0];
  const sigLen = kbSig.length;
  const ph     = document.getElementById("ghost-placeholder");

  if (!word && sigLen === 0) {
    ph.style.display = "";
    document.getElementById("ghost-typed").textContent   = "";
    document.getElementById("ghost-pipe").textContent    = "";
    document.getElementById("ghost-pending").textContent = "";
    return;
  }

  ph.style.display = "none";

  if (!word) {
    document.getElementById("ghost-typed").textContent = "";
    document.getElementById("ghost-pipe").textContent = "";
    document.getElementById("ghost-pending").textContent = "[no match]";

    // Auto-reset after brief pause
    setTimeout(() => {
      kbReset();
    }, 700);

    return;
  }

  const typedPart   = word.slice(0, Math.min(sigLen, word.length));
  const pendingPart = sigLen < word.length ? word.slice(sigLen) : "";

  document.getElementById("ghost-typed").textContent   = typedPart;
  document.getElementById("ghost-pipe").textContent    = "|";
  document.getElementById("ghost-pending").textContent = pendingPart;
}

function flashFinger(index) {
  const btn = document.getElementById("fb-" + index);
  if (!btn) return;
  btn.classList.add("active");
  setTimeout(() => btn.classList.remove("active"), 150);
}

function toggleKb() {
  document.getElementById("kb-panel").classList.toggle("open");
}

function skipTutorial() {
  mode = "practice";
  tutorialIndex = TUTORIAL.length;
  practicesDone = 0;
  setFeedback("tutorial skipped", "good");
  newRound();
}

let keyboardVisible = true;

function toggleInputMode() {
  const kbPanel = document.getElementById("kb-panel");
  const inputRow = document.querySelector(".input-row");
  const btn = event.target;

  keyboardVisible = !keyboardVisible;

  if (keyboardVisible) {
    kbPanel.classList.add("open");
    inputRow.style.display = "none";
    btn.textContent = "Hide Keyboard";
  } else {
    kbPanel.classList.remove("open");
    inputRow.style.display = "flex";
    btn.textContent = "Show Keyboard";
    document.getElementById("typed-input").focus();
  }
}

window.addEventListener("DOMContentLoaded", () => {
  const isGitHubPages =
    location.hostname.includes("github.io");

  if (isGitHubPages) {
    document.getElementById("dev-buttons").style.display = "none";
  }
});

updateProgress();
newRound();
</script>
